<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名片管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --border: #e2ddd6;
  --border-strong: #c8c2b8;
  --text: #1a1814;
  --text-2: #6b6660;
  --text-3: #9e9890;
  --accent: #2d5be3;
  --accent-light: #eef1fd;
  --accent-text: #1a3db0;
  --green: #1a7a4a;
  --green-light: #edf7f2;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --amber: #b45309;
  --amber-light: #fef3e2;
  --radius: 10px;
  --radius-lg: 16px;
  --font: 'Noto Sans TC', sans-serif;
  --mono: 'DM Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* Layout */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
}

.logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.logo-mark {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}

.logo-mark svg { width: 18px; height: 18px; }
.logo-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  border-radius: 0;
  color: var(--text-2);
  font-size: 13.5px;
  transition: background 0.15s, color 0.15s;
  border: none; background: none; width: 100%; text-align: left;
}

.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 500; }

.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

.nav-section {
  font-size: 10px; font-family: var(--mono);
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
  padding: 16px 20px 6px;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
}

.stats-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-mini {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 10px 12px;
}
.stat-mini-val { font-size: 20px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.stat-mini-lbl { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* Main */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 12px;
}

.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--text-3); pointer-events: none;
}
#searchInput {
  padding: 8px 12px 8px 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font); font-size: 13px;
  width: 220px; background: var(--bg); color: var(--text);
  outline: none; transition: border 0.15s;
}
#searchInput:focus { border-color: var(--accent); background: white; }

.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; background: var(--surface); color: var(--text);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover { background: var(--bg); border-color: var(--border-strong); }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-text); border-color: var(--accent-text); }
.btn-danger { color: var(--red); border-color: var(--red-light); }
.btn-danger:hover { background: var(--red-light); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Page content */
.page { display: none; flex: 1; overflow-y: auto; padding: 28px; }
.page.active { display: block; }

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon {
  width: 56px; height: 56px;
  background: var(--accent-light);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.upload-icon svg { width: 26px; height: 26px; color: var(--accent); }
.upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.upload-sub { font-size: 13px; color: var(--text-2); }
.upload-sub span { color: var(--accent); font-weight: 500; cursor: pointer; }

/* Preview area */
.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }

.card-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.preview-img-wrap {
  aspect-ratio: 16/9;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.preview-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

.ocr-panel { padding: 16px; }
.ocr-label { font-size: 10px; font-family: var(--mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

.field-row { margin-bottom: 10px; }
.field-label { font-size: 11px; color: var(--text-3); margin-bottom: 3px; }
.field-input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font); font-size: 13px; color: var(--text);
  background: var(--bg); outline: none; transition: border 0.15s;
}
.field-input:focus { border-color: var(--accent); background: white; }

.tag-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag-chip {
  font-size: 11px; padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  cursor: pointer; color: var(--text-2);
  transition: all 0.12s; background: var(--bg);
}
.tag-chip.on { background: var(--accent); color: white; border-color: var(--accent); }

.ocr-actions { display: flex; gap: 8px; margin-top: 14px; }

/* Processing overlay */
.processing-bar {
  display: none;
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  align-items: center;
  gap: 14px;
}
.processing-bar.show { display: flex; }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-text { font-size: 13px; color: var(--text-2); }

/* Cards grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  position: relative;
}
.contact-card:hover { border-color: var(--accent); transform: translateY(-1px); }

.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
  margin-bottom: 12px; flex-shrink: 0;
}

.card-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.card-title { font-size: 12px; color: var(--text-2); margin-bottom: 8px; }
.card-detail { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
.card-detail svg { width: 12px; height: 12px; flex-shrink: 0; color: var(--text-3); }

.tag-badge {
  display: inline-block;
  font-size: 10px; font-family: var(--mono);
  padding: 2px 8px; border-radius: 999px;
  margin-top: 8px;
}

.card-menu {
  position: absolute; top: 12px; right: 12px;
  opacity: 0; transition: opacity 0.15s;
  display: flex; gap: 4px;
}
.contact-card:hover .card-menu { opacity: 1; }

/* Modal */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 520px; max-width: calc(100vw - 40px);
  max-height: 90vh; overflow-y: auto;
  border: 1px solid var(--border);
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.modal-title { font-size: 16px; font-weight: 600; flex: 1; }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* Export page */
.export-list { display: flex; flex-direction: column; gap: 10px; }
.export-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
}
.export-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.export-icon svg { width: 20px; height: 20px; }
.export-info { flex: 1; }
.export-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.export-sub { font-size: 12px; color: var(--text-2); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text);
  color: white;
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Empty state */
.empty {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-3);
}
.empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty p { font-size: 14px; }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.filter-chip {
  font-size: 12px; padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  cursor: pointer; background: var(--surface);
  color: var(--text-2); transition: all 0.12s;
}
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Section header */
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.section-hd h2 { font-size: 17px; font-weight: 600; }
.count-badge {
  font-size: 11px; font-family: var(--mono);
  background: var(--bg); color: var(--text-2);
  padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border);
}

/* Avatar colors */
.av-blue { background: #dbeafe; color: #1e40af; }
.av-green { background: #dcfce7; color: #166534; }
.av-amber { background: #fef3c7; color: #92400e; }
.av-rose { background: #ffe4e6; color: #9f1239; }
.av-purple { background: #ede9fe; color: #5b21b6; }
.av-teal { background: #ccfbf1; color: #115e59; }

.tag-blue { background: #dbeafe; color: #1e40af; }
.tag-green { background: #dcfce7; color: #166534; }
.tag-amber { background: #fef3c7; color: #92400e; }
.tag-rose { background: #ffe4e6; color: #9f1239; }
.tag-purple { background: #ede9fe; color: #5b21b6; }
.tag-gray { background: #f3f4f6; color: #374151; }
</style>
</head>
<body>

<div class="shell">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M8 12h8M8 8h5"/>
      </svg>
    </div>
    <div class="logo-title">名片管理</div>
    <div class="logo-sub">CardVault v1.0</div>
  </div>

  <div class="nav-section">主要功能</div>

  <button class="nav-item active" onclick="showPage('scan', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
      <rect x="7" y="7" width="10" height="10" rx="1"/>
    </svg>
    掃描上傳
  </button>

  <button class="nav-item" onclick="showPage('cards', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    名片庫
  </button>

  <button class="nav-item" onclick="showPage('export', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    匯出資料
  </button>

  <div class="sidebar-footer">
    <div class="stats-mini">
      <div class="stat-mini">
        <div class="stat-mini-val" id="sideTotal">0</div>
        <div class="stat-mini-lbl">名片總數</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-val" id="sideCompany">0</div>
        <div class="stat-mini-lbl">公司數</div>
      </div>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="pageTitle">掃描上傳</span>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋名片..." oninput="filterCards()">
    </div>
    <button class="btn btn-primary" onclick="showPage('scan', document.querySelector('.nav-item'))">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增名片
    </button>
  </div>

  <!-- Scan page -->
  <div class="page active" id="page-scan">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="upload-title">上傳名片圖片</div>
      <div class="upload-sub">拖曳圖片到這裡，或 <span>點擊選擇檔案</span></div>
      <div class="upload-sub" style="margin-top:6px; font-size:12px; color: var(--text-3);">支援 JPG、PNG、WEBP・可同時選擇多張</div>
    </div>

    <div class="processing-bar" id="processingBar">
      <div class="spinner"></div>
      <div class="processing-text" id="processingText">AI 辨識中，請稍候...</div>
    </div>

    <div id="previewArea"></div>
  </div>

  <!-- Cards page -->
  <div class="page" id="page-cards">
    <div class="section-hd">
      <h2>名片庫</h2>
      <span class="count-badge" id="cardCount">0 張</span>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" onclick="setFilter('all', this)">全部</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 12h8M8 8h5"/></svg>
      <p>尚無名片，請點「掃描上傳」新增</p>
    </div>
  </div>

  <!-- Export page -->
  <div class="page" id="page-export">
    <div class="section-hd">
      <h2>匯出資料</h2>
    </div>
    <p style="font-size:13px; color: var(--text-2); margin-bottom: 20px;">將名片資料匯出至其他工具使用</p>
    <div class="export-list">
      <div class="export-row">
        <div class="export-icon" style="background:#dcfce7;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h6M3 15h6M15 9h6M15 15h6"/></svg>
        </div>
        <div class="export-info">
          <div class="export-title">CSV 試算表</div>
          <div class="export-sub">適合 Excel、Google Sheets 管理</div>
        </div>
        <button class="btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載
        </button>
      </div>

      <div class="export-row">
        <div class="export-icon" style="background:#dbeafe;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="export-info">
          <div class="export-title">vCard (.vcf)</div>
          <div class="export-sub">匯入手機通訊錄、Outlook、Apple Contacts</div>
        </div>
        <button class="btn" onclick="exportVCard()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載
        </button>
      </div>

      <div class="export-row">
        <div class="export-icon" style="background:#ede9fe;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#5b21b6" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <div class="export-info">
          <div class="export-title">JSON</div>
          <div class="export-sub">開發者用・API 整合・程式讀取</div>
        </div>
        <button class="btn" onclick="exportJSON()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載
        </button>
      </div>

      <div class="export-row">
        <div class="export-icon" style="background:#fef3c7;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <div class="export-info">
          <div class="export-title">純文字備份</div>
          <div class="export-sub">人類可讀格式，方便快速查閱</div>
        </div>
        <button class="btn" onclick="exportTXT()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載
        </button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Detail Modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="avatar" id="modalAvatar" style="width:40px;height:40px;font-size:13px;"></div>
      <div class="modal-title" id="modalName"></div>
      <button class="btn btn-sm" onclick="editModal()">編輯</button>
      <button class="btn btn-sm btn-danger" onclick="deleteCard()">刪除</button>
      <button class="btn btn-sm" onclick="closeModal()" style="border:none;padding:4px 8px;">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">編輯名片</div>
      <button class="btn btn-sm" onclick="closeEditModal()" style="border:none;">✕</button>
    </div>
    <div class="modal-body" id="editModalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALL_TAGS = ['客戶','合作夥伴','供應商','行銷','科技','金融','醫療','教育','其他'];
const AV_COLORS = ['av-blue','av-green','av-amber','av-rose','av-purple','av-teal'];
const TAG_COLORS = ['tag-blue','tag-green','tag-amber','tag-rose','tag-purple','tag-gray'];

let cards = JSON.parse(localStorage.getItem('bcm_cards') || '[]');
let activeFilter = 'all';
let editingId = null;
let detailId = null;

function save() {
  localStorage.setItem('bcm_cards', JSON.stringify(cards));
  updateSidebar();
}

function updateSidebar() {
  document.getElementById('sideTotal').textContent = cards.length;
  const companies = new Set(cards.map(c => c.company).filter(Boolean));
  document.getElementById('sideCompany').textContent = companies.size;
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  const titles = { scan: '掃描上傳', cards: '名片庫', export: '匯出資料' };
  document.getElementById('pageTitle').textContent = titles[id] || '';
  if (id === 'cards') renderCards();
}

// Upload & OCR
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  if (!files.length) return;
  const bar = document.getElementById('processingBar');
  bar.classList.add('show');
  const area = document.getElementById('previewArea');
  area.innerHTML = '';
  let done = 0;
  Array.from(files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('processingText').textContent = `辨識第 ${i+1}/${files.length} 張...`;
      setTimeout(() => {
        const card = fakeOCR(file.name, e.target.result);
        renderPreview(card, e.target.result, area);
        done++;
        if (done === files.length) {
          bar.classList.remove('show');
          document.getElementById('processingText').textContent = 'AI 辨識中，請稍候...';
        }
      }, 800 + i * 400);
    };
    reader.readAsDataURL(file);
  });
}

function fakeOCR(filename, dataUrl) {
  const samples = [
    { name:'陳雅文', title:'行銷總監', company:'台灣科技股份有限公司', phone:'+886 2 2345-6789', email:'yawen.chen@twtech.com', address:'台北市信義區信義路五段 7 號', tag:'行銷' },
    { name:'林建宏', title:'業務副理', company:'創新數位科技', phone:'+886 912 345 678', email:'chien@innovate.tw', address:'新北市板橋區文化路一段 66 號', tag:'客戶' },
    { name:'王美玲', title:'執行長', company:'未來數位媒體', phone:'+886 2 8765-4321', email:'ml.wang@future.tw', address:'台北市中山區南京東路二段 100 號', tag:'合作夥伴' },
    { name:'Sarah Chen', title:'Product Manager', company:'Global Tech Inc.', phone:'+1 415 555 0123', email:'sarah@globaltech.com', address:'San Francisco, CA 94102', tag:'科技' },
    { name:'張志偉', title:'技術長 CTO', company:'雲端解決方案', phone:'+886 928 111 222', email:'zhiwei@cloud.com', address:'台中市西屯區台灣大道三段 99 號', tag:'科技' },
  ];
  return { ...samples[Math.floor(Math.random() * samples.length)], id: Date.now() + Math.random(), notes: '', imageData: dataUrl };
}

function renderPreview(card, imgSrc, container) {
  const div = document.createElement('div');
  div.style.cssText = 'margin-top:16px;';
  div.innerHTML = `
    <div class="card-preview">
      <div class="preview-img-wrap">
        <img src="${imgSrc}" alt="名片">
      </div>
      <div class="ocr-panel">
        <div class="ocr-label">辨識結果（可編輯後儲存）</div>
        <div class="field-row"><div class="field-label">姓名</div><input class="field-input" id="f-name-${card.id}" value="${card.name}"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="field-row"><div class="field-label">職稱</div><input class="field-input" id="f-title-${card.id}" value="${card.title}"></div>
          <div class="field-row"><div class="field-label">公司</div><input class="field-input" id="f-company-${card.id}" value="${card.company}"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="field-row"><div class="field-label">電話</div><input class="field-input" id="f-phone-${card.id}" value="${card.phone}"></div>
          <div class="field-row"><div class="field-label">Email</div><input class="field-input" id="f-email-${card.id}" value="${card.email}"></div>
        </div>
        <div class="field-row"><div class="field-label">地址</div><input class="field-input" id="f-address-${card.id}" value="${card.address}"></div>
        <div class="field-label" style="margin-top:10px;">分類標籤</div>
        <div class="tag-picker" id="tags-${card.id}">
          ${ALL_TAGS.map(t => `<button class="tag-chip ${t===card.tag?'on':''}" onclick="toggleTag(this,'${card.id}')">${t}</button>`).join('')}
        </div>
        <div class="ocr-actions">
          <button class="btn btn-primary" onclick="savePreviewCard('${card.id}')">
            <svg style="width:14px;height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            儲存名片
          </button>
          <button class="btn" onclick="this.closest('.card-preview').parentElement.remove()">捨棄</button>
        </div>
      </div>
    </div>`;
  container.appendChild(div);
  div._card = card;
}

function toggleTag(btn, id) {
  btn.closest('.tag-picker').querySelectorAll('.tag-chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
}

function savePreviewCard(id) {
  const get = suffix => document.getElementById(`f-${suffix}-${id}`)?.value || '';
  const tagEl = document.querySelector(`#tags-${id} .tag-chip.on`);
  const card = {
    id: Date.now(),
    name: get('name'), title: get('title'), company: get('company'),
    phone: get('phone'), email: get('email'), address: get('address'),
    tag: tagEl ? tagEl.textContent : '',
    notes: '', createdAt: new Date().toLocaleDateString('zh-TW')
  };
  cards.unshift(card);
  save();
  document.getElementById(`f-name-${id}`)?.closest('.card-preview')?.parentElement?.remove();
  showToast(`「${card.name}」已儲存`);
  updateFilterBar();
}

// Cards list
function getAvColor(id) { return AV_COLORS[id % AV_COLORS.length]; }
function getTagColor(tag) {
  const i = ALL_TAGS.indexOf(tag);
  return TAG_COLORS[i >= 0 ? i % TAG_COLORS.length : TAG_COLORS.length - 1];
}
function initials(name) {
  if (!name) return '?';
  if (/[\u4e00-\u9fff]/.test(name)) return name.slice(-2);
  return name.split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = cards.filter(c => {
    const matchQ = !q || [c.name,c.company,c.title,c.email,c.tag].some(v => v?.toLowerCase().includes(q));
    const matchF = activeFilter === 'all' || c.tag === activeFilter;
    return matchQ && matchF;
  });

  document.getElementById('cardCount').textContent = `${filtered.length} 張`;
  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((c, i) => `
    <div class="contact-card" onclick="openDetail(${c.id})">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div class="avatar ${getAvColor(i)}">${initials(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="card-name">${c.name}</div>
          <div class="card-title">${[c.title, c.company].filter(Boolean).join(' · ')}</div>
          ${c.phone ? `<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.5 3.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.5a16 16 0 0 0 5.61 5.61l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.5 17z"/></svg>${c.phone}</div>` : ''}
          ${c.email ? `<div class="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${c.email}</div>` : ''}
          ${c.tag ? `<span class="tag-badge ${getTagColor(c.tag)}">${c.tag}</span>` : ''}
        </div>
      </div>
      <div class="card-menu">
        <button class="btn btn-sm" onclick="event.stopPropagation();openEditById(${c.id})">編輯</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteById(${c.id})">刪除</button>
      </div>
    </div>
  `).join('');
}

function filterCards() { renderCards(); }

function updateFilterBar() {
  const tags = [...new Set(cards.map(c => c.tag).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<button class="filter-chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">全部</button>`;
  tags.forEach(t => {
    const b = document.createElement('button');
    b.className = 'filter-chip' + (activeFilter === t ? ' active' : '');
    b.textContent = t;
    b.onclick = function() { setFilter(t, this); };
    bar.appendChild(b);
  });
}

function setFilter(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// Detail modal
function openDetail(id) {
  detailId = id;
  const c = cards.find(x => x.id === id);
  if (!c) return;
  const av = document.getElementById('modalAvatar');
  const i = cards.indexOf(c);
  av.className = `avatar ${getAvColor(i)}`;
  av.style.cssText = 'width:40px;height:40px;font-size:13px;';
  av.textContent = initials(c.name);
  document.getElementById('modalName').textContent = c.name;

  const rows = [
    ['職稱', c.title], ['公司', c.company], ['電話', c.phone],
    ['Email', c.email], ['地址', c.address], ['備註', c.notes],
    ['標籤', c.tag], ['新增日期', c.createdAt]
  ].filter(([, v]) => v);

  document.getElementById('modalBody').innerHTML = rows.map(([l, v]) => `
    <div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="width:80px;font-size:12px;color:var(--text-3);flex-shrink:0;">${l}</span>
      <span style="font-size:13px;">${v}</span>
    </div>`).join('');

  document.getElementById('detailModal').classList.add('open');
}

function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

function editModal() {
  closeModal();
  openEditById(detailId);
}

function deleteCard() {
  if (!confirm('確定刪除這張名片？')) return;
  deleteById(detailId);
  closeModal();
}

function deleteById(id) {
  const c = cards.find(x => x.id === id);
  cards = cards.filter(x => x.id !== id);
  save();
  renderCards();
  showToast(`已刪除「${c?.name || ''}」`);
}

// Edit modal
function openEditById(id) {
  editingId = id;
  const c = cards.find(x => x.id === id) || {};
  document.getElementById('editModalTitle').textContent = id ? '編輯名片' : '新增名片';
  document.getElementById('editModalBody').innerHTML = `
    <div class="field-row"><div class="field-label">姓名 *</div><input class="field-input" id="em-name" value="${c.name||''}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="field-row"><div class="field-label">職稱</div><input class="field-input" id="em-title" value="${c.title||''}"></div>
      <div class="field-row"><div class="field-label">公司</div><input class="field-input" id="em-company" value="${c.company||''}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="field-row"><div class="field-label">電話</div><input class="field-input" id="em-phone" value="${c.phone||''}"></div>
      <div class="field-row"><div class="field-label">Email</div><input class="field-input" id="em-email" value="${c.email||''}"></div>
    </div>
    <div class="field-row"><div class="field-label">地址</div><input class="field-input" id="em-address" value="${c.address||''}"></div>
    <div class="field-row"><div class="field-label">備註</div><input class="field-input" id="em-notes" value="${c.notes||''}"></div>
    <div class="field-label" style="margin-top:10px;">分類標籤</div>
    <div class="tag-picker" id="em-tags">
      ${ALL_TAGS.map(t => `<button class="tag-chip ${t===(c.tag||'')?'on':''}" onclick="this.closest('.tag-picker').querySelectorAll('.tag-chip').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${t}</button>`).join('')}
    </div>`;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

function saveEdit() {
  const get = id => document.getElementById(id)?.value.trim() || '';
  const tagEl = document.querySelector('#em-tags .tag-chip.on');
  const name = get('em-name');
  if (!name) { showToast('姓名為必填'); return; }

  if (editingId) {
    const i = cards.findIndex(x => x.id === editingId);
    if (i >= 0) {
      cards[i] = { ...cards[i], name, title: get('em-title'), company: get('em-company'),
        phone: get('em-phone'), email: get('em-email'), address: get('em-address'),
        notes: get('em-notes'), tag: tagEl ? tagEl.textContent : '' };
    }
  } else {
    cards.unshift({ id: Date.now(), name, title: get('em-title'), company: get('em-company'),
      phone: get('em-phone'), email: get('em-email'), address: get('em-address'),
      notes: get('em-notes'), tag: tagEl ? tagEl.textContent : '',
      createdAt: new Date().toLocaleDateString('zh-TW') });
  }
  save();
  updateFilterBar();
  renderCards();
  closeEditModal();
  showToast('已儲存');
}

// Export
function dl(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename; a.click();
}

function exportCSV() {
  if (!cards.length) { showToast('名片庫是空的'); return; }
  const hdr = '姓名,職稱,公司,電話,Email,地址,標籤,備註\n';
  const rows = cards.map(c => [c.name,c.title,c.company,c.phone,c.email,c.address,c.tag,c.notes]
    .map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('\uFEFF' + hdr + rows, 'business_cards.csv', 'text/csv;charset=utf-8');
  showToast(`已匯出 ${cards.length} 張名片`);
}

function exportVCard() {
  if (!cards.length) { showToast('名片庫是空的'); return; }
  const content = cards.map(c => [
    'BEGIN:VCARD', 'VERSION:3.0', `FN:${c.name}`,
    c.company ? `ORG:${c.company}` : '',
    c.title ? `TITLE:${c.title}` : '',
    c.phone ? `TEL;TYPE=WORK:${c.phone}` : '',
    c.email ? `EMAIL;TYPE=WORK:${c.email}` : '',
    c.address ? `ADR;TYPE=WORK:;;${c.address};;;;` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n')).join('\n\n');
  dl(content, 'business_cards.vcf', 'text/vcard');
  showToast(`已匯出 ${cards.length} 張名片`);
}

function exportJSON() {
  if (!cards.length) { showToast('名片庫是空的'); return; }
  dl(JSON.stringify(cards, null, 2), 'business_cards.json', 'application/json');
  showToast(`已匯出 ${cards.length} 張名片`);
}

function exportTXT() {
  if (!cards.length) { showToast('名片庫是空的'); return; }
  const content = cards.map((c, i) => [
    `── 名片 ${i+1} ──`,
    `姓名：${c.name}`, c.title&&`職稱：${c.title}`, c.company&&`公司：${c.company}`,
    c.phone&&`電話：${c.phone}`, c.email&&`Email：${c.email}`,
    c.address&&`地址：${c.address}`, c.tag&&`標籤：${c.tag}`, c.notes&&`備註：${c.notes}`
  ].filter(Boolean).join('\n')).join('\n\n');
  dl(content, 'business_cards.txt', 'text/plain;charset=utf-8');
  showToast(`已匯出 ${cards.length} 張名片`);
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Click outside to close modals
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEditModal();
});

// Init
updateSidebar();
updateFilterBar();
renderCards();
</script>
</body>
</html>
